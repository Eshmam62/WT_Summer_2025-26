<!DOCTYPE html>
<html>

<head>

    <title>Contact Form Validation</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Contact Form Validation</h2>

<form onsubmit="return handleSubmit()">

<label>Name:</label>
<input type="text" id="name">
<p id="nameError" class="error"></p>

<label>Email:</label>
<input type="text" id="email">
<p id="emailError" class="error"></p>

<label>Phone Number:</label>
<input type="text" id="phone">
<p id="phoneError" class="error"></p>

<label>Password:</label>
<input type="password" id="password">
<p id="passwordError" class="error"></p>

<label>Age:</label>
<input type="text" id="age">
<p id="ageError" class="error"></p>

<label>Message:</label>
<textarea id="message" rows="4"></textarea>
<p id="messageError" class="error"></p>

<button type="submit">Submit</button>

</form>

<div id="successMessage"></div>

</div>

<script>

function clearErrors()
{
    document.getElementById("nameError").innerHTML="";
    document.getElementById("emailError").innerHTML="";
    document.getElementById("phoneError").innerHTML="";
    document.getElementById("passwordError").innerHTML="";
    document.getElementById("ageError").innerHTML="";
    document.getElementById("messageError").innerHTML="";
    document.getElementById("successMessage").innerHTML="";
}

function handleSubmit()
{

    clearErrors();

    var name=document.getElementById("name").value.trim();
    var email=document.getElementById("email").value.trim();
    var phone=document.getElementById("phone").value.trim();
    var password=document.getElementById("password").value;
    var age=document.getElementById("age").value.trim();
    var message=document.getElementById("message").value.trim();

    var valid=true;


    // Empty Validation

    if(name=="")
    {
        document.getElementById("nameError").innerHTML="Name is required.";
        valid=false;
    }

    if(email=="")
    {
        document.getElementById("emailError").innerHTML="Email is required.";
        valid=false;
    }

    if(phone=="")
    {
        document.getElementById("phoneError").innerHTML="Phone Number is required.";
        valid=false;
    }

    if(password=="")
    {
        document.getElementById("passwordError").innerHTML="Password is required.";
        valid=false;
    }

    if(age=="")
    {
        document.getElementById("ageError").innerHTML="Age is required.";
        valid=false;
    }

    if(message=="")
    {
        document.getElementById("messageError").innerHTML="Message is required.";
        valid=false;
    }

    if(valid==false)
    {
        return false;
    }


    // Name Validation

    if(!/^[A-Za-z ]{3,}$/.test(name))
    {
        document.getElementById("nameError").innerHTML="Only alphabets and minimum 3 characters.";
        valid=false;
    }


    // Email Validation

    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
    {
        document.getElementById("emailError").innerHTML="Invalid Email.";
        valid=false;
    }


    // Phone Validation

    if(!/^\d{11}$/.test(phone))
    {
        document.getElementById("phoneError").innerHTML="Phone must be exactly 10 digits.";
        valid=false;
    }


    // Password Validation

    if(!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/.test(password))
    {
        document.getElementById("passwordError").innerHTML="Weak Password.";
        valid=false;
    }


    // Age Validation

    if(isNaN(age) || age<18)
    {
        document.getElementById("ageError").innerHTML="Age must be 18 or older.";
        valid=false;
    }


    // Message Validation

    if(message.length<10)
    {
        document.getElementById("messageError").innerHTML="Minimum 10 characters.";
        valid=false;
    }


    if(valid)
    {

        document.getElementById("successMessage").innerHTML=
        "<h3>Registration Successful!</h3>"+
        "<p><b>Name:</b> "+name+"</p>"+
        "<p><b>Email:</b> "+email+"</p>"+
        "<p><b>Phone:</b> "+phone+"</p>"+
        "<p><b>Age:</b> "+age+"</p>"+
        "<p><b>Message:</b> "+message+"</p>"+
        "<p>Thank you for registering successfully.</p>";

        document.querySelector("form").reset();

    }

    return false;

}

</script>

</body>

</html>
